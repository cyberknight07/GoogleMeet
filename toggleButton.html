<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme Toggle</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #1a1a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        transition:
          background-color 0.4s ease,
          color 0.4s ease;
      }

      body.light-theme {
        background-color: #f5f5f5;
        color: #1a1a1a;
      }

      body.dark-theme {
        background-color: #1a1a1a;
        color: #ffffff;
      }

      .toggle-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }

      .theme-label {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 1px;
      }

      .toggle-switch {
        position: relative;
        width: 120px;
        height: 60px;
        background-color: #444;
        border-radius: 30px;
        cursor: pointer;
        border: 2px solid #666;
        transition: all 0.4s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }

      .toggle-switch.active {
        background-color: #969896;
        border-color: #b3b6b3;
        box-shadow: 0 4px 20px rgba(76, 175, 80, 0.4);
      }

      .toggle-slider {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 52px;
        height: 52px;
        background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
        border-radius: 50%;
        transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      .toggle-switch.active .toggle-slider {
        left: 64px;
        background: linear-gradient(135deg,#ffffff 0%, #e0e0e0 100%);
      }

      .text-inner {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 15px;
        color: #999;
        font-size: 12px;
        font-weight: bold;
        pointer-events: none;
      }

      .toggle-switch.active .text-inner {
        color: #fff;
      }

      .info-text {
        font-size: 14px;
        opacity: 0.7;
        margin-top: 10px;
      }
    </style>
  </head>
  <body class="dark-theme">
    <div class="toggle-container">
      <div class="theme-label">Theme Switcher</div>

      <div class="toggle-switch active" id="change-theme">
        <div class="text-inner">
          <span>🌙</span>
          <span>☀️</span>
        </div>
        <div class="toggle-slider"></div>
      </div>

      <div class="info-text" id="theme-info">Dark Mode Enabled</div>
    </div>
  </body>

  <script>
    const toggleSwitch = document.getElementById("change-theme");
    const bodyContainer = document.body;
    const themeInfo = document.getElementById("theme-info");
    let isDark = true;

    toggleSwitch.addEventListener("click", (e) => {
      isDark = !isDark;

      if (isDark) {
        bodyContainer.classList.remove("light-theme");
        bodyContainer.classList.add("dark-theme");
        toggleSwitch.classList.add("active");
        themeInfo.textContent = "Dark Mode Enabled";
      } else {
        bodyContainer.classList.remove("dark-theme");
        bodyContainer.classList.add("light-theme");
        toggleSwitch.classList.remove("active");
        themeInfo.textContent = "Light Mode Enabled";
      }
    });
  </script>
</html>
