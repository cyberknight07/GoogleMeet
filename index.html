<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: #202124;
        color: white;
      }

      /* Layout */
      .wrapper {
        display: flex;
        height: 100vh;
      }

      /* VIDEO AREA */
      .video-area {
        flex: 3;
        display: flex;
        gap: 10px;
        padding: 10px;
        margin: 20px;
        background: #000;
        border-radius: 18px;
      }

      /* Video card */
      .video-card {
        background: #000;
        border-radius: 12px;
        position: relative;
        overflow: hidden;
      }

      /* Name overlay */
      .video-name {
        position: absolute;
        bottom: 8px;
        left: 8px;
        font-size: 14px;
        background: rgba(0, 0, 0, 0.5);
        padding: 4px 8px;
        border-radius: 6px;
      }

      /* SIDEBAR */
      #sidebar {
        flex: 1;
        background: #202124;
        border-left: 1px solid #3c4043;
        padding: 16px;
        display: flex;
        flex-direction: column;
      }

      .search {
        background: #303134;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 12px;
        color: #9aa0a6;
      }

      .section-title {
        font-size: 18px;
        color: #9aa0a6;
        margin-bottom: 6px;
      }

      ul {
        list-style: none;
        overflow-y: auto;
      }

      /* People item */
      .item-wrapper {
        display: flex;
        justify-content: space-between;
        padding: 8px;
        border-radius: 10px;
        transition: 0.2s;
      }

      .item-wrapper:hover {
        background: #303134;
      }

      .item-left {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .initial-element {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: #5f6368;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* CONTROLS */
      .controls {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 14px;
      }

      /* Buttons */
      .control-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: #303134;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
      }

      .control-btn:hover {
        background: #3c4043;
      }

      .end-call {
        background: #ea4335;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <!-- VIDEO GRID -->
      <div class="video-area" id="video-area"></div>

      <!-- SIDEBAR -->
      <div id="sidebar">
        <div>
          <h2>People</h2>
          
        </div>
        <br/>
        <div class="search">Search</div>

        <div class="section-title">Contributing</div>
        <ul id="people-list"></ul>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <div class="control-btn">🎤</div>
      <div class="control-btn">📹</div>
      <div class="control-btn end-call">📞</div>
    </div>
  </body>
</html>

<script>
  const names = ["Aviral", "Rahul", "Simran", "Ankit", "Priya"];

  /* VIDEO GRID */
  const videoArea = document.getElementById("video-area");

  const createVideoCard = (name) => {
    const card = document.createElement("div");
    card.classList.add("video-card");

    const label = document.createElement("div");
    label.classList.add("video-name");
    label.innerText = name;

    card.appendChild(label);
    videoArea.appendChild(card);
  };

  names[0](createVideoCard);

  /* PEOPLE LIST */
  const list = document.getElementById("people-list");

  const createPerson = (name) => {
    const li = document.createElement("li");

    const wrapper = document.createElement("div");
    wrapper.classList.add("item-wrapper");

    const left = document.createElement("div");
    left.classList.add("item-left");

    const avatar = document.createElement("div");
    avatar.classList.add("initial-element");
    avatar.innerText = name[0];

    const text = document.createElement("span");
    text.innerText = name;

    left.appendChild(avatar);
    left.appendChild(text);

    const right = document.createElement("div");
    right.innerText = "🎤";

    wrapper.appendChild(left);
    wrapper.appendChild(right);
    li.appendChild(wrapper);

    list.appendChild(li);
  };

  names.forEach(createPerson);
</script>
