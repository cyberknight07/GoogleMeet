<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Drawing App</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        width: 100%;
        max-width: 1000px;
      }

      .toolbar {
        padding: 20px;
        background: #f8f9fa;
        border-bottom: 2px solid #e9ecef;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        align-items: center;
      }

      .tool-group {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .tool-group label {
        font-weight: 600;
        color: #495057;
        font-size: 14px;
      }

      button,
      select,
      input[type="color"] {
        padding: 10px 15px;
        border: 2px solid #dee2e6;
        border-radius: 8px;
        background: white;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      button:hover {
        background: #e9ecef;
        border-color: #667eea;
        transform: translateY(-2px);
      }

      button.active {
        background: #667eea;
        color: white;
        border-color: #667eea;
      }

      select {
        cursor: pointer;
      }

      select:hover {
        border-color: #667eea;
      }

      input[type="color"] {
        padding: 5px 10px;
        height: 44px;
        border-radius: 8px;
        cursor: pointer;
      }

      input[type="range"] {
        width: 150px;
        cursor: pointer;
      }

      .separator {
        width: 1px;
        height: 30px;
        background: #dee2e6;
      }

      #canvas {
        display: block;
        background: white;
        cursor: crosshair;
        width: 100%;
        border: none;
      }

      .canvas-container {
        position: relative;
        overflow: auto;
        height: 600px;
      }

      #canvas {
        display: block;
        background: white;
        cursor: crosshair;
      }

      .info-text {
        text-align: center;
        padding: 20px;
        color: #868e96;
        font-size: 13px;
        background: #f8f9fa;
        border-top: 1px solid #e9ecef;
      }

      .title {
        padding: 15px 20px;
        background: #667eea;
        color: white;
        margin: 0;
        font-size: 20px;
        font-weight: bold;
      }

      .btn-group {
        display: flex;
        gap: 5px;
      }

      .btn-group button {
        padding: 10px 12px;
      }

      .size-display {
        color: #495057;
        font-weight: 600;
        font-size: 13px;
        min-width: 50px;
      }

      #textInputContainer {
        position: absolute;
        display: none;
        background: white;
        border: 2px solid #667eea;
        border-radius: 8px;
        padding: 15px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        z-index: 1000;
        min-width: 250px;
      }

      #textInputContainer.visible {
        display: block;
      }

      #textInputContainer input {
        width: 100%;
        padding: 10px;
        font-size: 14px;
        border: 1px solid #dee2e6;
        border-radius: 5px;
        margin-bottom: 10px;
        font-family: inherit;
      }

      #textInputContainer .input-controls {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      #textInputContainer button {
        padding: 8px 15px;
        font-size: 12px;
        border: none;
      }

      #textInputContainer .btn-confirm {
        background: #667eea;
        color: white;
      }

      #textInputContainer .btn-cancel {
        background: #e9ecef;
        color: #495057;
      }

      #textPreview {
        padding: 10px;
        margin-bottom: 10px;
        border: 1px solid #dee2e6;
        border-radius: 5px;
        min-height: 40px;
        background: #f8f9fa;
        word-wrap: break-word;
      }

      .canvas-container {
        position: relative;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">🎨 Canvas Drawing App</h1>

      <div class="toolbar">
        <!-- Drawing Mode -->
        <div class="tool-group">
          <label>Mode:</label>
          <div class="btn-group">
            <button id="drawMode" class="active" title="Draw on canvas">
              ✏️ Draw
            </button>
            <button id="textMode" title="Add text to canvas">📝 Text</button>
          </div>
        </div>

        <div class="separator"></div>

        <!-- Drawing Tools -->
        <div class="tool-group">
          <label>Color:</label>
          <input type="color" id="colorPicker" value="#000000" />
        </div>

        <div class="tool-group">
          <label>Size:</label>
          <input type="range" id="brushSize" min="1" max="50" value="3" />
          <span class="size-display" id="sizeDisplay">3</span>
        </div>

        <div class="separator"></div>

        <!-- Font Options -->
        <div class="tool-group">
          <label>Font:</label>
          <select id="fontFamily">
            <option value="Arial">Arial</option>
            <option value="Verdana">Verdana</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="Georgia">Georgia</option>
            <option value="Comic Sans MS">Comic Sans MS</option>
            <option value="Trebuchet MS">Trebuchet MS</option>
          </select>
        </div>

        <div class="tool-group">
          <label>Text Size:</label>
          <input type="range" id="fontSize" min="10" max="100" value="24" />
          <span class="size-display" id="fontSizeDisplay">24</span>
        </div>

        <div class="separator"></div>

        <!-- Text Formatting -->
        <div class="tool-group">
          <button id="boldBtn" title="Bold">
            <strong>B</strong>
          </button>
          <button id="italicBtn" title="Italic">
            <em>I</em>
          </button>
          <button id="underlineBtn" title="Underline">
            <u>U</u>
          </button>
        </div>

        <div class="separator"></div>

        <!-- Clear Canvas -->
        <button id="clearBtn" title="Clear the canvas">🗑️ Clear</button>
      </div>

      <div class="canvas-container">
        <div id="textInputContainer">
          <div id="textPreview"></div>
          <input
            type="text"
            id="textInput"
            placeholder="Type your text here..."
          />
          <div class="input-controls">
            <button class="btn-cancel" id="textCancelBtn">Cancel</button>
            <button class="btn-confirm" id="textConfirmBtn">Add Text</button>
          </div>
        </div>
        <canvas id="canvas"></canvas>
      </div>

      <div class="info-text">
        <span id="modeInfo"
          >Draw Mode: Click and drag to draw. | Right-click to undo.</span
        >
      </div>
    </div>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      // State variables
      let isDrawing = false;
      let isTextMode = false;
      let drawingHistory = [];
      let currentColor = "#000000";
      let brushSize = 3;
      let fontSize = 24;
      let fontFamily = "Arial";
      let isBold = false;
      let isItalic = false;
      let isUnderline = false;

      // Set canvas size
      function resizeCanvas() {
        const container = canvas.parentElement;
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;

        // Redraw all history after resize
        if (drawingHistory.length > 0) {
          const lastState = drawingHistory[drawingHistory.length - 1];
          const img = new Image();
          img.onload = () => {
            ctx.drawImage(img, 0, 0);
          };
          img.src = lastState;
        }
      }

      // Initialize canvas
      setTimeout(() => {
        resizeCanvas();
      }, 100);

      window.addEventListener("resize", resizeCanvas);

      // Save canvas state for undo
      function saveState() {
        drawingHistory.push(canvas.toDataURL());
      }

      function undoDrawing() {
        if (drawingHistory.length > 0) {
          drawingHistory.pop();

          if (drawingHistory.length > 0) {
            const lastState = drawingHistory[drawingHistory.length - 1];
            const img = new Image();
            img.onload = () => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              ctx.drawImage(img, 0, 0);
            };
            img.src = lastState;
          } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
          }
        }
      }

      // Update toolbar active states
      function updateToolbarState() {
        const drawModeBtn = document.getElementById("drawMode");
        const textModeBtn = document.getElementById("textMode");
        const boldBtn = document.getElementById("boldBtn");
        const italicBtn = document.getElementById("italicBtn");
        const underlineBtn = document.getElementById("underlineBtn");

        drawModeBtn.classList.toggle("active", !isTextMode);
        textModeBtn.classList.toggle("active", isTextMode);
        boldBtn.classList.toggle("active", isBold);
        italicBtn.classList.toggle("active", isItalic);
        underlineBtn.classList.toggle("active", isUnderline);
      }

      // Canvas events for drawing
      canvas.addEventListener("mousedown", (e) => {
        if (isTextMode) {
          if (!textEditMode) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            showTextInput(x, y);
          }
          return;
        }

        saveState();
        isDrawing = true;
        const rect = canvas.getBoundingClientRect();
        ctx.beginPath();
        ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
      });

      canvas.addEventListener("mousemove", (e) => {
        if (!isDrawing || isTextMode) return;

        const rect = canvas.getBoundingClientRect();
        ctx.lineWidth = brushSize;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = currentColor;
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
      });

      canvas.addEventListener("mouseup", () => {
        isDrawing = false;
        ctx.closePath();
      });

      canvas.addEventListener("mouseout", () => {
        isDrawing = false;
        ctx.closePath();
      });

      canvas.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        undoDrawing();
      });

      // Add text to canvas
      let textEditMode = false;
      let textX = 0;
      let textY = 0;

      function showTextInput(x, y) {
        textEditMode = true;
        textX = x;
        textY = y;

        const textInputContainer =
          document.getElementById("textInputContainer");
        const textInput = document.getElementById("textInput");
        const canvasRect = canvas.getBoundingClientRect();
        const containerRect = canvas.parentElement.getBoundingClientRect();

        // Position the input box near the click point
        textInputContainer.style.left =
          x + canvasRect.left - containerRect.left + "px";
        textInputContainer.style.top =
          y + canvasRect.top - containerRect.top + 30 + "px";
        textInputContainer.classList.add("visible");
        textInput.value = "";
        textInput.focus();
        updateTextPreview();
      }

      function updateTextPreview() {
        const textInput = document.getElementById("textInput");
        const textPreview = document.getElementById("textPreview");

        let fontStyle = "";
        if (isItalic) fontStyle += "italic ";
        if (isBold) fontStyle += "bold ";

        textPreview.style.font = `${fontStyle}${fontSize}px ${fontFamily}`;
        textPreview.style.color = currentColor;

        let previewText = textInput.value || "Preview text";
        if (isUnderline) {
          textPreview.style.textDecoration = "underline";
        } else {
          textPreview.style.textDecoration = "none";
        }

        textPreview.textContent = previewText;
      }

      function placeText() {
        const textInput = document.getElementById("textInput");
        const text = textInput.value.trim();

        if (text === "") {
          alert("Please enter some text");
          return;
        }

        saveState();

        let fontStyle = "";
        if (isItalic) fontStyle += "italic ";
        if (isBold) fontStyle += "bold ";

        ctx.font = `${fontStyle}${fontSize}px ${fontFamily}`;
        ctx.fillStyle = currentColor;
        ctx.textBaseline = "top";
        ctx.textAlign = "left";
        ctx.fillText(text, textX, textY);

        // Add underline if needed
        if (isUnderline) {
          const metrics = ctx.measureText(text);
          const underlineY = textY + fontSize;
          ctx.strokeStyle = currentColor;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(textX, underlineY);
          ctx.lineTo(textX + metrics.width, underlineY);
          ctx.stroke();
        }

        hideTextInput();
      }

      function hideTextInput() {
        textEditMode = false;
        const textInputContainer =
          document.getElementById("textInputContainer");
        textInputContainer.classList.remove("visible");
      }

      // UI Controls
      document.getElementById("colorPicker").addEventListener("change", (e) => {
        currentColor = e.target.value;
        if (textEditMode) updateTextPreview();
        console.log("Color changed to:", currentColor);
      });

      document.getElementById("brushSize").addEventListener("input", (e) => {
        brushSize = parseInt(e.target.value);
        document.getElementById("sizeDisplay").textContent = brushSize;
        console.log("Brush size changed to:", brushSize);
      });

      document.getElementById("fontSize").addEventListener("input", (e) => {
        fontSize = parseInt(e.target.value);
        document.getElementById("fontSizeDisplay").textContent = fontSize;
        if (textEditMode) updateTextPreview();
        console.log("Font size changed to:", fontSize);
      });

      document.getElementById("fontFamily").addEventListener("change", (e) => {
        fontFamily = e.target.value;
        if (textEditMode) updateTextPreview();
        console.log("Font changed to:", fontFamily);
      });

      document.getElementById("drawMode").addEventListener("click", () => {
        isTextMode = false;
        canvas.style.cursor = "crosshair";
        document.getElementById("modeInfo").textContent =
          "Draw Mode: Click and drag to draw. | Right-click to undo.";
        updateToolbarState();
        console.log("Switched to Draw Mode");
      });

      document.getElementById("textMode").addEventListener("click", () => {
        isTextMode = true;
        canvas.style.cursor = "text";
        document.getElementById("modeInfo").textContent =
          "Text Mode: Click to place text. Use formatting buttons to style text.";
        updateToolbarState();
        console.log("Switched to Text Mode");
      });

      document.getElementById("boldBtn").addEventListener("click", () => {
        isBold = !isBold;
        updateToolbarState();
        if (textEditMode) updateTextPreview();
        console.log("Bold toggled:", isBold);
      });

      document.getElementById("italicBtn").addEventListener("click", () => {
        isItalic = !isItalic;
        updateToolbarState();
        if (textEditMode) updateTextPreview();
        console.log("Italic toggled:", isItalic);
      });

      document.getElementById("underlineBtn").addEventListener("click", () => {
        isUnderline = !isUnderline;
        updateToolbarState();
        if (textEditMode) updateTextPreview();
        console.log("Underline toggled:", isUnderline);
      });

      document.getElementById("clearBtn").addEventListener("click", () => {
        if (confirm("Are you sure you want to clear the canvas?")) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          drawingHistory = [];
          console.log("Canvas cleared");
        }
      });

      // Initialize toolbar state
      updateToolbarState();
      console.log("Canvas app initialized");

      // Text input event listeners
      document.getElementById("textInput").addEventListener("input", () => {
        updateTextPreview();
      });

      document
        .getElementById("textConfirmBtn")
        .addEventListener("click", () => {
          placeText();
        });

      document.getElementById("textCancelBtn").addEventListener("click", () => {
        hideTextInput();
      });

      document.getElementById("textInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          placeText();
        } else if (e.key === "Escape") {
          hideTextInput();
        }
      });
    </script>
  </body>
</html>
